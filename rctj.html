            background: white;
            border-radius: 8px;

            padding: 2rem;
            white-space: nowrap;
           position:fixed;

            color: #1a365d;
            margin-bottom: 0.5rem;
        }

        }

            display: block;
            margin-bottom: 1rem;
            color: #1a365d;
            text-decoration: none;
            font-weight: bold;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            transition: background-color 0.3s;

        .sidebar a.active {

            font-weight: bold;
        }

        .sidebar a:not(.active):hover {
            background-color: #f1f5f9;
        }

    

    /* 年份卡片通用样式 */

    .photo-wall{position:relative;width:100%;margin-top:1rem;}
    .photo-wall img{position:absolute;width:275px;height:206.25px;object-fit:cover;border-radius:8px;box-shadow:0 3px 8px rgba(0,0,0,.15);transition:.3s;}
    .photo-wall img:hover{transform:scale(1.05) rotate(0deg)!important;z-index:10;}
